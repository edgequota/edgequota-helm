{{- if .Values.nodeUdpTuning.enabled }}
{{- $nodeSelector := coalesce .Values.nodeUdpTuning.nodeSelector .Values.nodeSelector }}
{{- $tolerations  := coalesce .Values.nodeUdpTuning.tolerations  .Values.tolerations }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "edgequota.fullname" . }}-node-udp-tuning
  namespace: {{ .Values.nodeUdpTuning.namespace | default "kube-system" }}
  labels:
    {{- include "edgequota.labels" . | nindent 4 }}
    app.kubernetes.io/component: node-udp-tuning
spec:
  selector:
    matchLabels:
      {{- include "edgequota.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: node-udp-tuning
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "edgequota.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: node-udp-tuning
    spec:
      priorityClassName: system-node-critical
      {{- with $tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: sysctl-tuner
          image: {{ .Values.nodeUdpTuning.image.repository }}:{{ .Values.nodeUdpTuning.image.tag }}
          imagePullPolicy: {{ .Values.nodeUdpTuning.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              sysctl -w net.core.rmem_max={{ .Values.nodeUdpTuning.bufferSize }} net.core.wmem_max={{ .Values.nodeUdpTuning.bufferSize }}
              sleep infinity
          securityContext:
            privileged: true
          resources:
            {{- toYaml .Values.nodeUdpTuning.resources | nindent 12 }}
{{- end }}
